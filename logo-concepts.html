<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freshman Finance — Logo Concepts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    padding: 48px 28px 60px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  h1 {
    text-align: center;
    color: #e0c87a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .sub {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 1px;
    margin-bottom: 36px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 22px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 36px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 18px 48px rgba(0,0,0,0.5); }
  .card svg { display: block; width: 100%; }
  .tag {
    padding: 11px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    background: #111;
    border-top: 1px solid #222;
  }
</style>
</head>
<body>

<h1>Freshman Finance</h1>
<p class="sub">6 logo concepts — click to inspect</p>

<div class="grid">

  <!-- ══════════════════════════════════════════
       CONCEPT A  |  Dark Bold  |  Bar Chart + Blue→Gold Gradient
       ══════════════════════════════════════════ -->
  <div class="card">
    <svg viewBox="0 0 360 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="aIcon" x1="100" y1="275" x2="290" y2="118" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#0A2DB5"/>
          <stop offset="48%"  stop-color="#3B7BFF"/>
          <stop offset="100%" stop-color="#FFD700"/>
        </linearGradient>
        <linearGradient id="aGold" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFE566"/>
          <stop offset="100%" stop-color="#B8700A"/>
        </linearGradient>
        <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#0a0a0a"/>
          <stop offset="100%" stop-color="#050505"/>
        </linearGradient>
        <filter id="aGlow">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="360" height="450" fill="url(#aBg)"/>
      <g transform="translate(0,8)">
        <!-- Swoosh arc: 11 o'clock → 4 o'clock, circle center (182,188) r=114 -->
        <path d="M 125,88 A 114,114 0 1,0 281,245"
              fill="none" stroke="url(#aIcon)" stroke-width="12" stroke-linecap="round" filter="url(#aGlow)"/>
        <!-- 5 bars -->
        <rect x="120" y="202" width="21" height="43"  rx="3" fill="url(#aIcon)"/>
        <rect x="147" y="185" width="21" height="60"  rx="3" fill="url(#aIcon)"/>
        <rect x="174" y="167" width="21" height="78"  rx="3" fill="url(#aIcon)"/>
        <rect x="201" y="148" width="21" height="97"  rx="3" fill="url(#aIcon)"/>
        <rect x="228" y="127" width="21" height="118" rx="3" fill="url(#aIcon)"/>
        <!-- Trend line -->
        <path d="M 104,245 L 146,277 L 278,132"
              fill="none" stroke="url(#aIcon)" stroke-width="11"
              stroke-linecap="round" stroke-linejoin="round" filter="url(#aGlow)"/>
        <!-- Arrowhead -->
        <polygon points="0,-17 -9,8 9,8" transform="translate(286,122) rotate(-47)" fill="#FFD700" filter="url(#aGlow)"/>
      </g>
      <text x="180" y="373" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="48" text-anchor="middle" fill="#FFF" letter-spacing="1">FRESHMAN</text>
      <text x="180" y="427" font-family="Arial,sans-serif"
            font-weight="700" font-size="30" text-anchor="middle" fill="url(#aGold)" letter-spacing="12">FINANCE</text>
    </svg>
    <div class="tag">A — Dark Bold  (Black + Blue→Gold)</div>
  </div>


  <!-- ══════════════════════════════════════════
       CONCEPT B  |  Classic Navy  |  Bar Chart solid navy, light bg
       ══════════════════════════════════════════ -->
  <div class="card">
    <svg viewBox="0 0 360 450" xmlns="http://www.w3.org/2000/svg">
      <rect width="360" height="450" fill="#EBF3FF"/>
      <g transform="translate(0,8)">
        <path d="M 125,88 A 114,114 0 1,0 281,245"
              fill="none" stroke="#1B5299" stroke-width="17" stroke-linecap="round"/>
        <rect x="120" y="202" width="21" height="43"  rx="3" fill="#1B5299"/>
        <rect x="147" y="185" width="21" height="60"  rx="3" fill="#1B5299"/>
        <rect x="174" y="167" width="21" height="78"  rx="3" fill="#1B5299"/>
        <rect x="201" y="148" width="21" height="97"  rx="3" fill="#1B5299"/>
        <rect x="228" y="127" width="21" height="118" rx="3" fill="#1B5299"/>
        <path d="M 104,245 L 146,277 L 278,132"
              fill="none" stroke="#1B5299" stroke-width="13"
              stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="0,-17 -9,8 9,8" transform="translate(286,122) rotate(-47)" fill="#1B5299"/>
      </g>
      <text x="180" y="373" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="48" text-anchor="middle" fill="#1A3668" letter-spacing="1">FRESHMAN</text>
      <text x="180" y="425" font-family="Arial,sans-serif"
            font-weight="700" font-size="30" text-anchor="middle" fill="#1A3668" letter-spacing="12">FINANCE</text>
    </svg>
    <div class="tag">B — Classic Navy  (Light Background)</div>
  </div>


  <!-- ══════════════════════════════════════════
       CONCEPT C  |  Navy & Gold  |  Bar chart, gold icon, dark bg
       ══════════════════════════════════════════ -->
  <div class="card">
    <svg viewBox="0 0 360 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cIcon" x1="104" y1="277" x2="286" y2="122" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#D4880A"/>
          <stop offset="100%" stop-color="#FFE566"/>
        </linearGradient>
        <linearGradient id="cGold" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFE566"/>
          <stop offset="100%" stop-color="#C07D00"/>
        </linearGradient>
        <linearGradient id="cBg" x1="0%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%"   stop-color="#102280"/>
          <stop offset="100%" stop-color="#050B30"/>
        </linearGradient>
        <filter id="cGlow">
          <feGaussianBlur stdDeviation="3.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="360" height="450" fill="url(#cBg)"/>
      <g transform="translate(0,8)">
        <path d="M 125,88 A 114,114 0 1,0 281,245"
              fill="none" stroke="url(#cIcon)" stroke-width="12" stroke-linecap="round" filter="url(#cGlow)"/>
        <rect x="120" y="202" width="21" height="43"  rx="3" fill="url(#cIcon)"/>
        <rect x="147" y="185" width="21" height="60"  rx="3" fill="url(#cIcon)"/>
        <rect x="174" y="167" width="21" height="78"  rx="3" fill="url(#cIcon)"/>
        <rect x="201" y="148" width="21" height="97"  rx="3" fill="url(#cIcon)"/>
        <rect x="228" y="127" width="21" height="118" rx="3" fill="url(#cIcon)"/>
        <path d="M 104,245 L 146,277 L 278,132"
              fill="none" stroke="url(#cIcon)" stroke-width="11"
              stroke-linecap="round" stroke-linejoin="round" filter="url(#cGlow)"/>
        <polygon points="0,-17 -9,8 9,8" transform="translate(286,122) rotate(-47)" fill="#FFE566" filter="url(#cGlow)"/>
      </g>
      <text x="180" y="373" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="48" text-anchor="middle" fill="#FFF" letter-spacing="1">FRESHMAN</text>
      <text x="180" y="427" font-family="Arial,sans-serif"
            font-weight="700" font-size="30" text-anchor="middle" fill="url(#cGold)" letter-spacing="12">FINANCE</text>
    </svg>
    <div class="tag">C — Navy &amp; Gold  (Dark Premium)</div>
  </div>


  <!-- ══════════════════════════════════════════
       CONCEPT D  |  White Two-Tone  |  Navy bars, gold swoosh/arrow
       ══════════════════════════════════════════ -->
  <div class="card">
    <svg viewBox="0 0 360 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dGold" x1="104" y1="277" x2="286" y2="122" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#E8960A"/>
          <stop offset="100%" stop-color="#FFE566"/>
        </linearGradient>
        <linearGradient id="dGoldTxt" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFD035"/>
          <stop offset="100%" stop-color="#C07D00"/>
        </linearGradient>
      </defs>
      <rect width="360" height="450" fill="#FFFFFF"/>
      <g transform="translate(0,8)">
        <!-- Gold swoosh -->
        <path d="M 125,88 A 114,114 0 1,0 281,245"
              fill="none" stroke="url(#dGold)" stroke-width="15" stroke-linecap="round"/>
        <!-- Navy bars -->
        <rect x="120" y="202" width="21" height="43"  rx="3" fill="#1B3A8C"/>
        <rect x="147" y="185" width="21" height="60"  rx="3" fill="#1B3A8C"/>
        <rect x="174" y="167" width="21" height="78"  rx="3" fill="#1B3A8C"/>
        <rect x="201" y="148" width="21" height="97"  rx="3" fill="#1B3A8C"/>
        <rect x="228" y="127" width="21" height="118" rx="3" fill="#1B3A8C"/>
        <!-- Gold trend line -->
        <path d="M 104,245 L 146,277 L 278,132"
              fill="none" stroke="url(#dGold)" stroke-width="13"
              stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="0,-17 -9,8 9,8" transform="translate(286,122) rotate(-47)" fill="#F5A623"/>
      </g>
      <text x="180" y="373" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="48" text-anchor="middle" fill="#0D1B4B" letter-spacing="1">FRESHMAN</text>
      <text x="180" y="427" font-family="Arial,sans-serif"
            font-weight="700" font-size="30" text-anchor="middle" fill="url(#dGoldTxt)" letter-spacing="12">FINANCE</text>
    </svg>
    <div class="tag">D — White Two-Tone  (Navy Bars + Gold Arrow)</div>
  </div>


  <!-- ══════════════════════════════════════════
       CONCEPT E  |  FF Monogram + Arrow Slash
       ══════════════════════════════════════════ -->
  <div class="card">
    <svg viewBox="0 0 360 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="eBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#0E2070"/>
          <stop offset="100%" stop-color="#050B30"/>
        </linearGradient>
        <linearGradient id="eFF" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#5090FF"/>
          <stop offset="100%" stop-color="#1040CC"/>
        </linearGradient>
        <linearGradient id="eArrow" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#D4880A"/>
          <stop offset="100%" stop-color="#FFE566"/>
        </linearGradient>
        <linearGradient id="eGoldTxt" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFE566"/>
          <stop offset="100%" stop-color="#C07D00"/>
        </linearGradient>
        <filter id="eGlow">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="eGlowLight">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="360" height="450" fill="url(#eBg)"/>

      <!-- Subtle radial glow behind FF -->
      <radialGradient id="eRadial" cx="50%" cy="45%" r="40%">
        <stop offset="0%"   stop-color="#1B4AE8" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#1B4AE8" stop-opacity="0"/>
      </radialGradient>
      <ellipse cx="180" cy="185" rx="130" ry="110" fill="url(#eRadial)"/>

      <!-- FF monogram -->
      <text x="180" y="245"
            font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="172" text-anchor="middle"
            fill="url(#eFF)" letter-spacing="-8" opacity="0.95">FF</text>

      <!-- Gold arrow slash (behind gives depth, on top gives punch — use on top) -->
      <!-- Shadow pass -->
      <line x1="45" y1="295" x2="322" y2="102"
            stroke="#FFD700" stroke-width="16" stroke-linecap="round"
            opacity="0.18" filter="url(#eGlow)"/>
      <!-- Main line -->
      <line x1="45" y1="295" x2="314" y2="110"
            stroke="url(#eArrow)" stroke-width="10" stroke-linecap="round"/>
      <!-- Arrowhead -->
      <polygon points="0,-16 -9,8 9,8"
               transform="translate(322,102) rotate(-35)"
               fill="#FFE566" filter="url(#eGlowLight)"/>

      <!-- Thin gold rule -->
      <rect x="70" y="275" width="220" height="3" rx="1.5" fill="url(#eArrow)" opacity="0.6"/>

      <!-- FRESHMAN -->
      <text x="180" y="360"
            font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="48" text-anchor="middle"
            fill="#FFFFFF" letter-spacing="2">FRESHMAN</text>

      <!-- — FINANCE — with dashes -->
      <text x="180" y="415"
            font-family="Arial,sans-serif"
            font-weight="700" font-size="26" text-anchor="middle"
            fill="url(#eGoldTxt)" letter-spacing="10">— FINANCE —</text>
    </svg>
    <div class="tag">E — FF Monogram  (Gold Arrow Slash)</div>
  </div>


  <!-- ══════════════════════════════════════════
       CONCEPT F  |  Shield & Crest  |  Academic / Trust
       ══════════════════════════════════════════ -->
  <div class="card">
    <svg viewBox="0 0 360 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#0E2070"/>
          <stop offset="100%" stop-color="#050B30"/>
        </linearGradient>
        <linearGradient id="fFF" x1="0%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%"   stop-color="#5090FF"/>
          <stop offset="100%" stop-color="#1A4AE0"/>
        </linearGradient>
        <linearGradient id="fGold" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFE566"/>
          <stop offset="100%" stop-color="#B8700A"/>
        </linearGradient>
        <linearGradient id="fGoldTxt" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#FFE566"/>
          <stop offset="100%" stop-color="#C07D00"/>
        </linearGradient>
        <filter id="fGlow">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <rect width="360" height="450" fill="url(#fBg)"/>

      <!-- Shield outer (gold border) -->
      <path d="M 95,68 L 265,68 L 265,200 Q 265,235 180,268 Q 95,235 95,200 Z"
            fill="#0A1A5A" stroke="url(#fGold)" stroke-width="5.5"
            filter="url(#fGlow)"/>
      <!-- Shield inner (thin accent line) -->
      <path d="M 104,76 L 256,76 L 256,198 Q 256,228 180,258 Q 104,228 104,198 Z"
            fill="none" stroke="url(#fGold)" stroke-width="1.5" opacity="0.4"/>

      <!-- FF inside shield -->
      <text x="180" y="212"
            font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="120" text-anchor="middle"
            fill="url(#fFF)" letter-spacing="-6">FF</text>

      <!-- Gold horizontal rule inside shield -->
      <rect x="120" y="219" width="120" height="2.5" rx="1.25" fill="url(#fGold)" opacity="0.7"/>

      <!-- Graduation cap at bottom of shield -->
      <!-- Cap board (diamond) -->
      <polygon points="180,240 198,247 180,254 162,247" fill="url(#fGold)"/>
      <!-- Cap top knob -->
      <circle cx="180" cy="238" r="3.5" fill="url(#fGold)"/>
      <!-- Tassel -->
      <line x1="197" y1="247" x2="203" y2="260" stroke="url(#fGold)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="203" cy="262" r="3" fill="url(#fGold)"/>

      <!-- Laurel branches (left) -->
      <g fill="#C8860A" opacity="0.85">
        <ellipse rx="10" ry="5" transform="translate(148,268) rotate(55)"/>
        <ellipse rx="10" ry="5" transform="translate(132,262) rotate(42)"/>
        <ellipse rx="10" ry="5" transform="translate(120,252) rotate(30)"/>
        <ellipse rx="10" ry="5" transform="translate(112,238) rotate(18)"/>
        <ellipse rx="10" ry="5" transform="translate(110,222) rotate(5)"/>
        <ellipse rx="10" ry="5" transform="translate(113,207) rotate(-8)"/>
      </g>
      <!-- Laurel branches (right) -->
      <g fill="#C8860A" opacity="0.85">
        <ellipse rx="10" ry="5" transform="translate(212,268) rotate(-55)"/>
        <ellipse rx="10" ry="5" transform="translate(228,262) rotate(-42)"/>
        <ellipse rx="10" ry="5" transform="translate(240,252) rotate(-30)"/>
        <ellipse rx="10" ry="5" transform="translate(248,238) rotate(-18)"/>
        <ellipse rx="10" ry="5" transform="translate(250,222) rotate(-5)"/>
        <ellipse rx="10" ry="5" transform="translate(247,207) rotate(8)"/>
      </g>

      <!-- FRESHMAN -->
      <text x="180" y="354"
            font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
            font-weight="900" font-size="46" text-anchor="middle"
            fill="#FFFFFF" letter-spacing="2">FRESHMAN</text>

      <!-- — FINANCE — -->
      <text x="180" y="405"
            font-family="Arial,sans-serif"
            font-weight="700" font-size="25" text-anchor="middle"
            fill="url(#fGoldTxt)" letter-spacing="10">— FINANCE —</text>

      <!-- Tagline -->
      <text x="180" y="432"
            font-family="Arial,sans-serif"
            font-weight="400" font-size="10.5" text-anchor="middle"
            fill="rgba(255,255,255,0.4)" letter-spacing="2.5">MASTER YOUR MONEY. BUILD YOUR FUTURE.</text>
    </svg>
    <div class="tag">F — Shield &amp; Crest  (Academic / Trust)</div>
  </div>

</div>
</body>
</html>
