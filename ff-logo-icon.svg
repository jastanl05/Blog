<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3EA8"/>
      <stop offset="100%" stop-color="#09122E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="130" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="60%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#C07D00"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F5B800"/>
      <stop offset="70%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#FFE566" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="68" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow border -->
  <rect width="500" height="500" rx="68" fill="none" stroke="#F5B800" stroke-width="1.5" opacity="0.18"/>

  <!-- Decorative circle ring -->
  <circle cx="250" cy="232" r="196" fill="none" stroke="#F5B800" stroke-width="1" opacity="0.1"/>

  <!-- Corner accent dots -->
  <circle cx="78" cy="78" r="4" fill="#F5B800" opacity="0.25"/>
  <circle cx="422" cy="78" r="4" fill="#F5B800" opacity="0.25"/>
  <circle cx="78" cy="422" r="4" fill="#F5B800" opacity="0.25"/>
  <circle cx="422" cy="422" r="4" fill="#F5B800" opacity="0.25"/>

  <!-- FF Monogram -->
  <text x="252" y="318"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="246"
        text-anchor="middle"
        fill="url(#goldGrad)"
        letter-spacing="-12"
        filter="url(#glow)">FF</text>

  <!-- Gold accent line -->
  <rect x="118" y="350" width="264" height="5" rx="2.5" fill="url(#lineGrad)"/>
</svg>
