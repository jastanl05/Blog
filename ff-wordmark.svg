<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3EA8"/>
      <stop offset="100%" stop-color="#09122E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="60" x2="0" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="60%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#C07D00"/>
    </linearGradient>
    <linearGradient id="goldGradText" x1="0" y1="80" x2="0" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="60%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#C07D00"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F5B800"/>
      <stop offset="70%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#FFE566" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="1200" height="340" rx="20" fill="none" stroke="#F5B800" stroke-width="1.5" opacity="0.15"/>

  <!-- ── ICON BADGE (left) ── -->
  <rect x="28" y="28" width="284" height="284" rx="46" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="28" y="28" width="284" height="284" rx="46" fill="none" stroke="#F5B800" stroke-width="1" opacity="0.2"/>

  <!-- Decorative ring inside badge -->
  <circle cx="170" cy="158" r="120" fill="none" stroke="#F5B800" stroke-width="1" opacity="0.08"/>

  <!-- FF inside badge -->
  <text x="172" y="214"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="152"
        text-anchor="middle"
        fill="url(#goldGrad)"
        letter-spacing="-8"
        filter="url(#glow)">FF</text>

  <!-- Badge accent line -->
  <rect x="76" y="234" width="188" height="4" rx="2" fill="url(#lineGrad)"/>

  <!-- ── DIVIDER ── -->
  <rect x="344" y="48" width="1.5" height="244" rx="0.75" fill="#ffffff" opacity="0.12"/>

  <!-- ── BRAND TEXT (right) ── -->
  <!-- FRESHMAN -->
  <text x="384" y="166"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="92"
        fill="#FFFFFF"
        letter-spacing="7">FRESHMAN</text>

  <!-- FINANCE in gold -->
  <text x="384" y="270"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="92"
        fill="url(#goldGradText)"
        letter-spacing="7"
        filter="url(#glow)">FINANCE</text>
</svg>
